<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Desktop - unofficial</title>
    <style>
        /* 背景と全体のデザイン */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 赤いぼかし光のエフェクト */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,0,0,0.15) 0%, rgba(255,0,0,0) 70%);
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,0,0,0.1) 0%, rgba(255,0,0,0) 70%);
            z-index: -1;
        }

        /* メインカード */
        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .app-icon {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255,0,0,0.5));
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        h1 span { color: #ff0000; }

        p {
            color: #aaaaaa;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
