<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Desktop</title>
    <style>
        /* 背景の動く光の演出 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 背後の赤いぼかし光 */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,0,0,0.15) 0%, rgba(255,0,0,0) 70%);
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,0,0,0.1) 0%, rgba(255,0,0,0) 70%);
            z-index: -1;
        }

        /* メインカード（グラスモーフィズム） */
        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .app-icon {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255,0,0,0.5));
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        h1 span { color: #ff0000; }

        p {
            color: #aaaaaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* YouTube風の赤いボタン */
        .download-btn {
            display: inline-block;
            background: #ff0000;
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255,0,0,0.3);
        }

        .download-btn:hover {
            background: #cc0000;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255,0,0,0.4);
        }

        /* インストール手順のバッジ */
        .info-box {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            font-size: 0.85rem;
            text-align: left;
        }

        .info-box h3 { margin-top: 0; color: #fff; font-size: 1rem; }
        .info-box ol { padding-left: 20px; color: #ccc; }
        .info-box li { margin-bottom: 8px; }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="app-icon">▶️</div>
        <h1><span>You</span>Tube Desktop</h1>
        <p>軽量・快速・シンプル。<br>F11フルスクリーンとミニプレイヤーを搭載した究極のプレイヤー。</p>
        
        <a href="YouTube.appinstaller" class="download-btn">今すぐインストール</a>

        <div class="info-box">
            <h3>🚀 クイックスタート</h3>
            <ol>
                <li>上のボタンから <b>.appinstaller</b> をダウンロード。</li>
                <li>ファイルを開き「インストール」をクリック。</li>
                <li>スタートメニューから起動してログイン！</li>
            </ol>
        </div>

        <div class="footer">
            Windows 10 / 11 対応 | v1.0.1 | Developed by You
        </div>
    </div>

</body>
</html>
